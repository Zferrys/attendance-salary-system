# ============================================================
# Druid 数据库连接池配置文件
# 用途: 配置MySQL数据库连接参数和连接池属性
# 位置: src/main/resources/druid.properties
# 说明: MyBatis通过此配置获取DataSource数据源
# ============================================================

# ---- 基本数据库连接信息 ----
# MySQL驱动类名（MySQL Connector/J 8.x 使用 com.mysql.cj.jdbc.Driver）
driverClassName=com.mysql.cj.jdbc.Driver

# JDBC连接URL（重要参数说明）：
#   - localhost:3306: MySQL服务器地址和端口
#   - attendance_salary: 数据库名称（与init.sql中一致）
#   - useUnicode=true&characterEncoding=UTF-8: 支持中文及emoji存储（MySQL自动映射为utf8mb4）
#   - useSSL=false: 本地开发关闭SSL验证
#   - serverTimezone=Asia/Shanghai: 时区设置（避免时区报错）
#   - rewriteBatchedStatements=true: 批量操作优化，提升性能
url=jdbc:mysql://localhost:3306/attendance_salary?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true

# 登录用户名（默认root）
username=root

# 登录密码（根据实际MySQL密码修改，当前为 zph）
password=zph

# ---- 连接池核心参数配置 ----
# 初始连接数: 应用启动时创建的初始连接数量
initialSize=5

# 最小空闲连接数: 连接池中最少保持的空闲连接数
minIdle=3

# 最大活跃连接数: 连接池允许的最大同时使用的连接数
maxActive=20

# 最大等待时间(ms): 获取连接时的最大等待超时时间(毫秒)
maxWait=5000
